name: Security Secrets Scan

on:
  push:
    branches:
      - main
      - website
  pull_request:
    branches:
      - main
      - website

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run mandatory secrets check
        run: |
          chmod +x scripts/security/check-secrets.sh
          scripts/security/check-secrets.sh .
